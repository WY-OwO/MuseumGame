<!doctype html>
<html lang="en">
    <head>
        <!--Name that shows up on the tab-->
        <title>Museum Game</title>

        <!-- Bootstrap CSS v5.2.1; in case I habitually use it and can't tell if I did or not -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
            crossorigin="anonymous"
        />

        <link href="base.css" rel="stylesheet" type="text/css">
    </head>

    <body>
        <main id="bodyBG">
            <div id="navBar" class="container" style="width: 1270px;">
                <img src="Images/TopPlaceholder.png">
                <a href="LINK_HERE"><button class="buttonNav">Visit</button></a>
                <a href="LINK_HERE"><button class="buttonNav">Exhibition</button></a>
                <a href="LINK_HERE"><button class="buttonNav">See More</button></a>
            </div>
            
            <div style="display: flex; justify-content: center;">
                <div class="image">
                    <div id="carouselId" class="carousel slide container-md" data-bs-ride="carousel" style="opacity: 30%; background-size: cover; width:inherit;">
                        <ol class="carousel-indicators">
                            <li
                                data-bs-target="#carouselId"
                                data-bs-slide-to="0"
                                class="active"
                                aria-current="true"
                                aria-label="First slide"
                            ></li>
                            <li
                                data-bs-target="#carouselId"
                                data-bs-slide-to="1"
                                aria-label="Second slide"
                            ></li>
                            <li
                                data-bs-target="#carouselId"
                                data-bs-slide-to="2"
                                aria-label="Third slide"
                            ></li>
                        </ol>
                        <div class="carousel-inner" role="listbox">
                            <div class="carousel-item active">
                                <img
                                    src="Images/SlidePlaceholder1.png"
                                    class="w-100 d-block"
                                    alt="First slide"
                                />
                            </div>
                            <div class="carousel-item">
                                <img
                                    src="Images/SlidePlaceholder2.png"
                                    class="w-100 d-block"
                                    alt="Second slide"
                                />
                            </div>
                            <div class="carousel-item">
                                <img
                                    src="Images/SlidePlaceholder3.png"
                                    class="w-100 d-block"
                                    alt="Third slide"
                                />
                            </div>
                        </div>
                    </div>
                    <div id="titleBGFaux" class="container">
                        <img src="Images/TopPlaceholder2.png">
                    </div>
                    <div id="titleBG" class="container">
                        <p>The Museum</p>
                    </div>
                </div>
            </div>
            

            <p>Testing</p>
        </main>
    </body>

    <footer>
        <!--Credits?-->
    </footer>

    <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
            integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
            crossorigin="anonymous"
        ></script>
</html>
